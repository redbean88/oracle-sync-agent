spring:
  lifecycle:
    timeout-per-shutdown-phase: 6m
  datasource:
    source:
      jdbc-url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
      username: source
      password: 1234
      driver-class-name: oracle.jdbc.OracleDriver
      hikari:
        maximum-pool-size: 12        # numJobs(3) × 3 + 2 = 11 → 12
        connection-timeout: 30000
        leak-detection-threshold: 60000
        data-source-properties:
          oracle.jdbc.ReadTimeout: 600000
    target:
      jdbc-url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
      username: target
      password: 1234
      driver-class-name: oracle.jdbc.OracleDriver
      hikari:
        maximum-pool-size: 12
        connection-timeout: 30000
        leak-detection-threshold: 60000
        data-source-properties:
          oracle.jdbc.ReadTimeout: 600000
    proxy:
      jdbc-url: jdbc:oracle:thin:@localhost:1521/FREEPDB1
      username: proxy
      password: 1234
      driver-class-name: oracle.jdbc.OracleDriver
      hikari:
        maximum-pool-size: 12
        connection-timeout: 30000
        leak-detection-threshold: 60000
        data-source-properties:
          oracle.jdbc.ReadTimeout: 600000

sync:
  orders:
    enabled: true
    fixed-delay-ms: 60000
    chunk-size-initial: 2000
    chunk-size-min: 500
    chunk-size-max: 10000
    lag-alert-threshold: 100000
    retry:
      max-retry: 3
      initial-backoff-sec: 60
      backoff-step-sec: 300
      claim-batch-size: 50

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  endpoint:
    health:
      show-details: always
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState, syncDatabases
  health:
    probes:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
server:
  port: 8090
