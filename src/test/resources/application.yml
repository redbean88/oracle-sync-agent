spring:
  datasource:
    source:
      jdbc-url: jdbc:h2:mem:testdb;MODE=Oracle;DB_CLOSE_DELAY=-1
      username: sa
      password: ""
      driver-class-name: org.h2.Driver
    target:
      jdbc-url: jdbc:h2:mem:testdb;MODE=Oracle;DB_CLOSE_DELAY=-1
      username: sa
      password: ""
      driver-class-name: org.h2.Driver
  jpa:
    enabled: false
  sql:
    init:
      mode: never

sync:
  chunk-size-initial: 10
  chunk-size-min: 5
  chunk-size-max: 100
  lag-alert-threshold: 1000
  job-name: "ORDERS_SYNC"
  fixed-delay-ms: 60000
