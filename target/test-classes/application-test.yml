spring:
  datasource:
    source:
      url: jdbc:h2:mem:sourcedb;MODE=Oracle;DB_CLOSE_DELAY=-1
      driver-class-name: org.h2.Driver
      username: sa
      password: ""
    target:
      url: jdbc:h2:mem:targetdb;MODE=Oracle;DB_CLOSE_DELAY=-1
      driver-class-name: org.h2.Driver
      username: sa
      password: ""
  
  main:
    allow-bean-definition-overriding: true

sync:
  fixed-delay-ms: 1000
