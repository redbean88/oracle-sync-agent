spring:
  datasource:
    source:
      url: jdbc:h2:mem:sourcedb;MODE=Oracle;DB_CLOSE_DELAY=-1
      username: sa
      password: 
      driver-class-name: org.h2.Driver
    target:
      url: jdbc:h2:mem:targetdb;MODE=Oracle;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'classpath:sql/schema-checkpoint.sql'\;RUNSCRIPT FROM 'classpath:sql/schema-retry-queue.sql'\;RUNSCRIPT FROM 'classpath:sql/schema-shedlock.sql'
      username: sa
      password: 
      driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

sync:
  chunk-size-initial: 10
  chunk-size-min: 5
  chunk-size-max: 100
  lag-alert-threshold: 1000
  job-name: "ORDERS_SYNC"
  fixed-delay-ms: 60000

management:
  metrics:
    export:
      prometheus:
        enabled: true
